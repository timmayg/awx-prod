---
- name: Display contents of release-notes.txt
  hosts: localhost
  tasks:
    - name: find the contents of the EE root d
      ansible.builtin.command: ls -l 
      register: ls_content

    - name: find the contents of the EE root d
      ansible.builtin.command: ls -l /
      register: ls_root_content

    - name: find the contents of the EE root d
      ansible.builtin.command: ls -l /runner
      register: ls_runner_content

    - name: find the contents of the EE root d
      ansible.builtin.command: ls -l /runner/artifacts
      register: ls_runner_artifacts_content


    - name: find the contents of the EE root d
      ansible.builtin.command: ls -l /runner/cp
      register: ls_runner_cp_content


    - name: find the contents of the EE root d
      ansible.builtin.command: ls -l /runner/env
      register: ls_runner_env_content


    - name: find the contents of the EE root d
      ansible.builtin.command: ls -l /runner/inventory
      register: ls_runner_inventory_content


    - name: find the contents of the EE root d
      ansible.builtin.command: ls -l /runner/project
      register: ls_runner_project_content





    - name: Read the contents of the release-notes.txt file
      ansible.builtin.command: cat release-notes.json
      register: release_notes_content

    - name: Display the contents of release-notes.json
      ansible.builtin.debug:
        msg: "{{ release_notes_content.stdout }}"
